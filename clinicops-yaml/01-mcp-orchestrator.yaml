apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-orchestrator
  namespace: clinicops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-orchestrator
  template:
    metadata:
      labels:
        app: mcp-orchestrator
    spec:
      containers:
        - name: mcp-orchestrator
          image: clinicopsacr.azurecr.io/mcp-orchestrator:1.0
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_MODEL
              value: "gpt-4.1-mini"
            - name: CLINICOPS_PROMPT_PROFILE
              value: "hospital"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-orchestrator
  namespace: clinicops
spec:
  selector:
    app: mcp-orchestrator
  ports:
    - port: 8080
      targetPort: 8080
