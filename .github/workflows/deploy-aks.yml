name: Build and Deploy ClinicOps to AKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. clinicopsacr.azurecr.io
  ACR_NAME: ${{ secrets.ACR_NAME }}     # e.g. clinicopsacr
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }} # e.g. clinicops-rg
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}     # e.g. clinicops-aks
  

  IMG_VOICE_API: voice-api
  IMG_MCP_ADAPTER: mcp-adapter
  IMG_MCP_ORCHESTRATOR: mcp-orchestrator

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set image tag (commit SHA)
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to ACR
        shell: bash
        run: |
          az acr login --name $ACR_Name

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push voice-api
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMG_VOICE_API:${{ steps.vars.outputs.TAG }} ./voice-api
          docker push $ACR_LOGIN_SERVER/$IMG_VOICE_API:${{ steps.vars.outputs.TAG }}

      - name: Build & push mcp-adapter
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMG_MCP_ADAPTER:${{ steps.vars.outputs.TAG }} ./mcp-adapter
          docker push $ACR_LOGIN_SERVER/$IMG_MCP_ADAPTER:${{ steps.vars.outputs.TAG }}

      - name: Build & push mcp-orchestrator
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMG_MCP_ORCHESTRATOR:${{ steps.vars.outputs.TAG }} ./mcp-orchestrator
          docker push $ACR_LOGIN_SERVER/$IMG_MCP_ORCHESTRATOR:${{ steps.vars.outputs.TAG }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$AKS_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to AKS (kustomize)
        run: |
          cd clinicops-yaml

          kustomize edit set image $ACR_LOGIN_SERVER/$IMG_VOICE_API=$ACR_LOGIN_SERVER/$IMG_VOICE_API:${{ steps.vars.outputs.TAG }}
          kustomize edit set image $ACR_LOGIN_SERVER/$IMG_MCP_ADAPTER=$ACR_LOGIN_SERVER/$IMG_MCP_ADAPTER:${{ steps.vars.outputs.TAG }}
          kustomize edit set image $ACR_LOGIN_SERVER/$IMG_MCP_ORCHESTRATOR=$ACR_LOGIN_SERVER/$IMG_MCP_ORCHESTRATOR:${{ steps.vars.outputs.TAG }}

          kubectl apply -k .

      - name: Show status
        run: |
          kubectl -n clinicops get pods -o wide
          kubectl -n clinicops get svc
