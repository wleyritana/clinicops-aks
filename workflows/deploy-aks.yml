name: Build & Deploy to AKS (ClinicOps)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
  AKS_RG: ${{ secrets.AKS_RG }}
  AKS_NAME: ${{ secrets.AKS_NAME }}
  K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login to Azure using the Service Principal you created in Entra ID
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      # Login to ACR for docker push
      - name: Docker login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      # -------------------------
      # Build & Push: voice-api
      # -------------------------
      - name: Build & push voice-api
        run: |
          docker build -t $ACR_LOGIN_SERVER/voice-api:${{ steps.vars.outputs.TAG }} ./voice-api
          docker push $ACR_LOGIN_SERVER/voice-api:${{ steps.vars.outputs.TAG }}

      # -------------------------
      # Build & Push: mcp-adapter
      # -------------------------
      - name: Build & push mcp-adapter
        run: |
          docker build -t $ACR_LOGIN_SERVER/mcp-adapter:${{ steps.vars.outputs.TAG }} ./mcp-adapter
          docker push $ACR_LOGIN_SERVER/mcp-adapter:${{ steps.vars.outputs.TAG }}

      # ------------------------------
      # Build & Push: mcp-orchestrator
      # ------------------------------
      - name: Build & push mcp-orchestrator
        run: |
          docker build -t $ACR_LOGIN_SERVER/mcp-orchestrator:${{ steps.vars.outputs.TAG }} ./mcp-orchestrator
          docker push $ACR_LOGIN_SERVER/mcp-orchestrator:${{ steps.vars.outputs.TAG }}

      # Get kubectl context for AKS (no kubeconfig stored in GitHub)
      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_NAME }}

      # Update the images in the existing deployments
      - name: Deploy updated images
        run: |
          kubectl -n $K8S_NAMESPACE set image deploy/voice-api voice-api=$ACR_LOGIN_SERVER/voice-api:${{ steps.vars.outputs.TAG }}
          kubectl -n $K8S_NAMESPACE set image deploy/mcp-adapter mcp-adapter=$ACR_LOGIN_SERVER/mcp-adapter:${{ steps.vars.outputs.TAG }}
          kubectl -n $K8S_NAMESPACE set image deploy/mcp-orchestrator mcp-orchestrator=$ACR_LOGIN_SERVER/mcp-orchestrator:${{ steps.vars.outputs.TAG }}

      # Wait for rollouts
      - name: Wait for rollouts
        run: |
          kubectl -n $K8S_NAMESPACE rollout status deploy/voice-api --timeout=180s
          kubectl -n $K8S_NAMESPACE rollout status deploy/mcp-adapter --timeout=180s
          kubectl -n $K8S_NAMESPACE rollout status deploy/mcp-orchestrator --timeout=180s
